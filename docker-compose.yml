services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: thehive-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CLIENT_ORIGIN=*
      - DEV_CPU_PLAY_DELAY_MS=${DEV_CPU_PLAY_DELAY_MS:-900}
    volumes:
      - ./apps/backend:/workspace/apps/backend
      - ./packages/contracts:/workspace/packages/contracts
      - /workspace/apps/backend/node_modules

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: thehive-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - ./packages/contracts:/workspace/packages/contracts
      - /workspace/apps/frontend/node_modules

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: thehive-tunnel
    command: tunnel --no-autoupdate --url http://frontend:5173
    depends_on:
      - frontend

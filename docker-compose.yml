services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: thehive-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CLIENT_ORIGIN=*
      - DEV_ROOM_ENABLED=${DEV_ROOM_ENABLED:-false}
      - DEV_ROOM_CODE=${DEV_ROOM_CODE:-DEVCPU}
      - DEV_CPU_PLAYERS=${DEV_CPU_PLAYERS:-3}
      - DEV_CPU_PLAY_DELAY_MS=${DEV_CPU_PLAY_DELAY_MS:-900}
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: thehive-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: thehive-tunnel
    command: tunnel --no-autoupdate --url http://frontend:5173
    depends_on:
      - frontend

services:
  - type: web
    name: the-hive-card-game-backend
    runtime: node
    rootDir: .
    buildCommand: npm --prefix packages/contracts install && npm --prefix packages/contracts run build && npm --prefix apps/backend install && npm --prefix apps/backend run build
    startCommand: npm --prefix apps/backend run start
    envVars:
      - key: PORT
        value: "3001"
      - key: CLIENT_ORIGIN
        value: "https://the-hive-card-game.onrender.com"

  - type: web
    name: the-hive-card-game
    runtime: static
    rootDir: .
    buildCommand: npm --prefix packages/contracts install && npm --prefix packages/contracts run build && npm --prefix apps/frontend install && npm --prefix apps/frontend run build
    staticPublishPath: ./apps/frontend/dist
    envVars:
      - key: VITE_SOCKET_URL
        value: "https://the-hive-card-game-backend.onrender.com"
